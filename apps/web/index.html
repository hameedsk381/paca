<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paca</title>
    <script>(()=> {try{const stored=window.localStorage.getItem('theme');const mode=(stored==='light'||stored==='dark'||stored==='auto')?stored:'auto';const prefersDark=window.matchMedia('(prefers-color-scheme: dark)').matches;const resolved=mode==='auto'?(prefersDark?'dark':'light'):mode;const root=document.documentElement;root.classList.remove('light','dark');root.classList.add(resolved);if(mode==='auto'){root.removeAttribute('data-theme')}else{root.setAttribute('data-theme',mode)}root.style.colorScheme=resolved;const storedAccent=window.localStorage.getItem('paca-accent');const accent=(storedAccent==='lime'||storedAccent==='blue'||storedAccent==='purple'||storedAccent==='orange')?storedAccent:'lime';root.setAttribute('data-accent',accent);const storedCompact=window.localStorage.getItem('paca-compact');if(storedCompact==='true'){root.setAttribute('data-compact','true')}}catch(_e){}})();</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
